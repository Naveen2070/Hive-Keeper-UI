<div class="p-7 bg-[#161a24] rounded-2xl border border-white/8 text-slate-200">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center">
      <mat-icon class="text-purple-500">admin_panel_settings</mat-icon>
    </div>
    <div>
      <h2 class="text-lg font-bold text-slate-50 m-0 leading-tight">Manage Roles</h2>
      <p class="text-xs text-slate-400 m-0">{{ data.user.fullName }} ({{ data.user.email }})</p>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" [formGroup]="form" class="flex flex-col gap-4">
    <div class="p-4 rounded-xl border border-white/5 bg-white/[0.02]">
      <h3 class="text-sm font-semibold mb-3 flex items-center gap-2">
        <mat-icon class="!text-[18px] !w-[18px] !h-[18px] text-slate-400">shield</mat-icon>
        Domain Access
      </h3>

      <div class="grid grid-cols-2 gap-4">
        <mat-form-field appearance="outline" class="hive-input w-full">
          <mat-label>Events Domain</mat-label>
          <mat-select formControlName="events">
            <mat-option value="NONE">None</mat-option>
            <mat-option value="USER">User</mat-option>
            <mat-option value="ORGANIZER">Organizer</mat-option>
            <mat-option value="ADMIN">Admin</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="hive-input w-full">
          <mat-label>Movies Domain</mat-label>
          <mat-select formControlName="movies">
            <mat-option value="NONE">None</mat-option>
            <mat-option value="USER">User</mat-option>
            <mat-option value="ORGANIZER">Organizer</mat-option>
            <mat-option value="ADMIN">Admin</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <p class="text-[11px] text-amber-400/80 mt-1 pl-1">Note: SUPER_ADMIN can only be assigned directly via DB
        script.</p>
    </div>

    <div class="flex justify-end gap-3 mt-4 pt-4 border-t border-white/5">
      <button (click)="ref.close()" class="!border-white/10 !text-slate-300 hover:!bg-white/5 !rounded-lg px-6" mat-stroked-button
              type="button">
        Cancel
      </button>
      <button [disabled]="form.invalid || form.pristine" class="!bg-purple-600 hover:!bg-purple-500 !text-white !rounded-lg px-6 disabled:!bg-white/5 disabled:!text-slate-500" mat-flat-button
              type="submit">
        Save Roles
      </button>
    </div>
  </form>
</div>
